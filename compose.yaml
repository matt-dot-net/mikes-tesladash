services:
  tesladash:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Tesla__ClientId: ${TESLA_CLIENT_ID:-}
      Tesla__ClientSecret: ${TESLA_CLIENT_SECRET:-}
      Tesla__RedirectUri: ${TESLA_REDIRECT_URI:-http://localhost:8080/Auth/Callback}
      Tesla__TokenPath: /data/tesla-tokens.protected
      Tesla__DataProtectionPath: /data/keys
    volumes:
      - tesladash-data:/data
    restart: unless-stopped

volumes:
  tesladash-data:
